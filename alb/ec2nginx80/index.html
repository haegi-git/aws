<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육 과정 안내</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: url('https://upload.wikimedia.org/wikipedia/commons/9/93/Amazon_Web_Services_Logo.svg') no-repeat center center fixed;
            background-size: 300px;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            /* 파란색 파스텔풍 그라데이션 적용 */
            background: linear-gradient(145deg, #e0f7fa, #b3e5fc);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: left;
            transition: transform 0.4s ease;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        /* 마우스 호버 시 흔들림 효과 */
        .card:hover {
            animation: shake 0.5s ease-in-out;
            box-shadow: 0 20px 40px rgba(0, 100, 200, 0.2);
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg); }
            75% { transform: rotate(2deg); }
        }

        h2 {
            color: #01579b;
            margin-bottom: 25px;
            border-bottom: 2px solid #0288d1;
            padding-bottom: 10px;
            font-size: 1.5rem;
        }

        .info-item {
            margin-bottom: 15px;
            line-height: 1.7;
        }

        .label {
            font-weight: 700;
            color: #0277bd;
            display: inline-block;
            width: 90px;
        }

        .value {
            color: #263238;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>교육 과정 안내</h2>
        
        <div class="info-item">
            <span class="label">사업명</span>
            <span class="value">부산정보산업인력육성사업</span>
        </div>
        <div class="info-item">
            <span class="label">과정명</span>
            <span class="value">AI로 완성하는 하이브리드 클라우드 아키텍쳐 엔지니어 양성 과정</span>
        </div>
        <div class="info-item">
            <span class="label">교육기간</span>
            <span class="value">2026년 6월 26일 ~ 2026년 12월 23일 (120일)</span>
        </div>
        <div class="info-item">
            <span class="label">강사</span>
            <span class="value">신중진</span>
        </div>
    </div>

</body>
</html>
